# Rate limiting zone: 10 requests per second for each IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Secure Headers - Tightened CSP (Removed unsafe-inline from scripts)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.google.com https://*.googleapis.com https://*.gstatic.com https://www.googletagmanager.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com https://cdn.jsdelivr.net; font-src 'self' data: https://*.gstatic.com; img-src 'self' data: blob: https://*.gstatic.com https://*.googleapis.com https://*.google.com; connect-src 'self' https://*.googleapis.com https://api.open-meteo.com https://nominatim.openstreetmap.org https://overpass-api.de https://region1.google-analytics.com https://cdn.jsdelivr.net;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS (If hosting backend APIs)
    add_header Access-Control-Allow-Origin "https://elected-app.run.app" always;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    location / {
        limit_req zone=api_limit burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
